<nav class="site-nav" aria-label="Primary navigation">
  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu">
    <span>Menu</span>
  </button>
  <ul id="site-menu" class="nav-list">
    {% for item in site.data.settings.navigation %}
      {% assign current = page.url == item.url %}
      <li>
        <a href="{{ item.url | relative_url }}"{% if current %} aria-current="page"{% endif %}>{{ item.title }}</a>
      </li>
    {% endfor %}
  </ul>
</nav>
