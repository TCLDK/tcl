<ul class="social-list" aria-label="Social links">
  {% for link in site.data.settings.social %}
    <li>
      <a href="{{ link.url }}" target="_blank" rel="noreferrer" aria-label="{{ link.title }}">
        {% case link.icon %}
          {% when 'linkedin' %}
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.94 8.5H3.56V20h3.38zm.22-4.1A1.96 1.96 0 1 0 3.24 4.4a1.96 1.96 0 0 0 3.92 0M20 12.02c0-3.32-1.77-4.86-4.13-4.86a3.57 3.57 0 0 0-3.22 1.77V8.5H9.28c.04.96 0 11.5 0 11.5h3.38v-6.42c0-.34.02-.68.13-.93.27-.68.9-1.38 1.95-1.38 1.38 0 1.93 1.04 1.93 2.57V20H20z"/></svg>
          {% when 'github' %}
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.12.82-.26.82-.58 0-.29-.01-1.05-.02-2.06-3.34.73-4.04-1.62-4.04-1.62A3.17 3.17 0 0 0 3.64 18c-1.09-.74.08-.73.08-.73a2.51 2.51 0 0 1 1.84 1.23 2.54 2.54 0 0 0 3.47.99 2.54 2.54 0 0 1 .76-1.59c-2.66-.3-5.45-1.33-5.45-5.91a4.63 4.63 0 0 1 1.23-3.22A4.3 4.3 0 0 1 5.69 5.6s1-.32 3.3 1.23a11.46 11.46 0 0 1 6 0c2.28-1.55 3.28-1.23 3.28-1.23.45 1.13.5 2.35.14 3.5a4.62 4.62 0 0 1 1.22 3.22c0 4.59-2.79 5.61-5.46 5.9a2.85 2.85 0 0 1 .81 2.21c0 1.6-.01 2.88-.01 3.27 0 .32.22.71.83.58A12 12 0 0 0 12 .5"/></svg>
          {% when 'x' %}
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.9 2H22l-6.77 7.74L23 22h-6.09l-4.76-6.23L6.7 22H3.58l7.24-8.28L1.5 2h6.24l4.3 5.68zm-1.07 18.17h1.68L6.82 3.74H5.02z"/></svg>
          {% else %}
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 5.5A2.5 2.5 0 0 1 4.5 3h15A2.5 2.5 0 0 1 22 5.5v13a2.5 2.5 0 0 1-2.5 2.5h-15A2.5 2.5 0 0 1 2 18.5zm2.7-.5 7.3 6.1L19.3 5zm15.3 1.3-6.9 5.76a1.7 1.7 0 0 1-2.18 0L4 6.3v12.2c0 .28.22.5.5.5h15c.28 0 .5-.22.5-.5z"/></svg>
        {% endcase %}
        <span>{{ link.title }}</span>
      </a>
    </li>
  {% endfor %}
</ul>
