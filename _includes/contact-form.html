<section class="section-block contact-grid">
  <div>
    <p class="eyebrow">Contact</p>
    <h2>{{ site.data.settings.contact.cta_title }}</h2>
    <p>{{ site.data.settings.contact.cta_copy }}</p>
    {% include social-icons.html %}
  </div>

  <form class="contact-form" action="{{ site.data.settings.contact.formspree_endpoint }}" method="POST">
    <label for="name">Name</label>
    <input id="name" name="name" type="text" autocomplete="name" required>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" autocomplete="email" required>

    <label for="subject">Subject</label>
    <input id="subject" name="subject" type="text" required>

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <input type="hidden" name="_subject" value="Website contact request">
    <button class="button button-primary" type="submit">Send message</button>
  </form>
</section>
